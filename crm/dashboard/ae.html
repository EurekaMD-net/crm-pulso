<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Azteca — Mi Dashboard</title>
  <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>
  <div class="header">
    <h1>CRM Azteca</h1>
    <div class="meta">
      <span id="persona-name"></span>
      <span id="role-badge" class="role-badge"></span>
      <span id="last-refresh"></span>
      <button onclick="loadAll()">Actualizar</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="dashboard">
    <!-- Quota + stats -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Mi Cuota</h2>
        <span id="cuota-semana" class="val-neutral"></span>
      </div>
      <div class="card-body" id="cuota-body">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- Pipeline -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Mi Pipeline</h2>
        <span id="pipeline-count" class="val-neutral"></span>
      </div>
      <div class="card-body">
        <div class="stats" id="pipeline-stats"></div>
        <div class="table-wrap" id="pipeline-table">
          <div class="loading">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- Descarga -->
    <div class="card">
      <div class="card-header">
        <h2>Mi Descarga</h2>
      </div>
      <div class="card-body" id="descarga-body">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- At-risk deals -->
    <div class="card">
      <div class="card-header">
        <h2>Deals Estancados</h2>
        <span id="risk-count" class="val-neutral"></span>
      </div>
      <div class="card-body">
        <div class="table-wrap" id="risk-table">
          <div class="loading">Cargando...</div>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    import { api, formatMoney, formatPct, quotaColor, quotaClass, getToken, clearToken, $, el, timeAgo } from '/dashboard/shared.js';

    window.logout = () => { clearToken(); window.location.href = '/dashboard/index.html'; };

    const token = getToken();
    if (!token) window.location.href = '/dashboard/index.html';

    try {
      const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      $('#role-badge').textContent = 'EJECUTIVO';
    } catch {}

    // --- Cuota ---
    async function loadCuota() {
      try {
        const [equipo, cuota] = await Promise.all([
          api('/api/v1/equipo'),
          api('/api/v1/cuota'),
        ]);

        const me = equipo.personas[0];
        if (me) $('#persona-name').textContent = me.nombre;

        const body = $('#cuota-body');
        body.innerHTML = '';

        const q = cuota.cuotas[0];
        $('#cuota-semana').textContent = `Semana ${cuota.semana}`;

        if (!q) {
          body.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Sin datos de cuota</div>';
          return;
        }

        body.appendChild(el('div', { style: 'display:flex;align-items:center;gap:24px;flex-wrap:wrap;' }, [
          el('div', { style: 'text-align:center;' }, [
            el('div', { className: quotaClass(q.porcentaje), style: 'font-family:var(--font-mono);font-weight:700;font-size:48px;', textContent: formatPct(q.porcentaje) }),
            el('div', { style: 'font-size:12px;color:var(--gray-500);margin-top:4px;', textContent: 'Avance de cuota' }),
          ]),
          el('div', { style: 'flex:1;min-width:200px;' }, [
            el('div', { style: 'height:12px;background:var(--gray-100);border-radius:6px;overflow:hidden;margin-bottom:12px;' }, [
              el('div', { style: `width:${Math.min(q.porcentaje, 100)}%;height:100%;background:${quotaColor(q.porcentaje)};border-radius:6px;transition:width .3s;` }),
            ]),
            el('div', { style: 'display:flex;justify-content:space-between;font-size:13px;' }, [
              el('div', {}, [
                el('span', { style: 'color:var(--gray-500);', textContent: 'Logro: ' }),
                el('span', { style: 'font-family:var(--font-mono);font-weight:600;', textContent: formatMoney(q.logro) }),
              ]),
              el('div', {}, [
                el('span', { style: 'color:var(--gray-500);', textContent: 'Meta: ' }),
                el('span', { style: 'font-family:var(--font-mono);font-weight:600;', textContent: formatMoney(q.meta) }),
              ]),
            ]),
          ]),
        ]));
      } catch (err) {
        $('#cuota-body').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Pipeline ---
    async function loadPipeline() {
      try {
        const data = await api('/api/v1/pipeline');
        const stats = $('#pipeline-stats');
        stats.innerHTML = '';

        const megaCount = data.propuestas.filter(p => p.es_mega).length;
        const stalledCount = data.propuestas.filter(p => p.dias_sin_actividad >= 7).length;

        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: 'stat-value', textContent: String(data.total_propuestas) }),
          el('div', { className: 'stat-label', textContent: 'Propuestas' }),
        ]));
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: 'stat-value', textContent: formatMoney(data.valor_total) }),
          el('div', { className: 'stat-label', textContent: 'Valor Total' }),
        ]));
        if (megaCount > 0) {
          stats.appendChild(el('div', { className: 'stat' }, [
            el('div', { className: 'stat-value', textContent: String(megaCount) }),
            el('div', { className: 'stat-label', textContent: 'Mega-Deals' }),
          ]));
        }
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: `stat-value ${stalledCount > 0 ? 'val-danger' : 'val-positive'}`, textContent: String(stalledCount) }),
          el('div', { className: 'stat-label', textContent: 'Estancadas' }),
        ]));

        $('#pipeline-count').textContent = `${data.total_propuestas} propuestas`;
        const wrap = $('#pipeline-table');
        wrap.innerHTML = '';

        if (data.propuestas.length === 0) {
          wrap.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Pipeline vacio</div>';
          return;
        }

        const table = el('table');
        table.appendChild(el('thead', {}, [el('tr', {}, [
          el('th', { textContent: 'Deal' }),
          el('th', { textContent: 'Cuenta' }),
          el('th', { textContent: 'Valor' }),
          el('th', { textContent: 'Etapa' }),
          el('th', { textContent: 'Dias' }),
        ])]));

        const tbody = el('tbody');
        for (const p of data.propuestas) {
          tbody.appendChild(el('tr', {}, [
            el('td', {}, [
              document.createTextNode(p.titulo),
              p.es_mega ? el('span', { className: 'tag tag-mega', textContent: 'MEGA', style: 'margin-left:6px;' }) : null,
            ].filter(Boolean)),
            el('td', { textContent: p.cuenta || '-' }),
            el('td', { style: 'font-family:var(--font-mono);', textContent: formatMoney(p.valor) }),
            el('td', {}, [el('span', { className: 'tag tag-stage', textContent: p.etapa?.replace(/_/g, ' ') || '-' })]),
            el('td', { className: (p.dias_sin_actividad || 0) >= 7 ? 'val-danger' : '', style: 'font-weight:600;', textContent: String(p.dias_sin_actividad || 0) }),
          ]));
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
      } catch (err) {
        $('#pipeline-table').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Descarga ---
    async function loadDescarga() {
      try {
        const data = await api('/api/v1/descarga');
        const body = $('#descarga-body');
        body.innerHTML = '';

        if (data.cuentas.length === 0) {
          body.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Sin datos de descarga</div>';
          return;
        }

        const gapPct = data.total_planificado > 0 ? ((data.gap_total / data.total_planificado) * 100).toFixed(1) : '0';
        body.appendChild(el('div', { style: 'display:flex;gap:16px;margin-bottom:12px;' }, [
          el('div', { className: 'stat' }, [
            el('div', { className: 'stat-value', textContent: formatMoney(data.total_facturado) }),
            el('div', { className: 'stat-label', textContent: 'Facturado' }),
          ]),
          el('div', { className: 'stat' }, [
            el('div', { className: 'stat-value', textContent: formatMoney(data.total_planificado) }),
            el('div', { className: 'stat-label', textContent: 'Planificado' }),
          ]),
          el('div', { className: 'stat' }, [
            el('div', { className: `stat-value ${data.gap_total > 0 ? 'val-danger' : 'val-positive'}`, textContent: formatMoney(data.gap_total) }),
            el('div', { className: 'stat-label', textContent: `Gap (${gapPct}%)` }),
          ]),
        ]));

        for (const c of data.cuentas) {
          const pct = c.planificado > 0 ? (c.facturado / c.planificado) * 100 : 0;
          body.appendChild(el('div', { style: 'margin-bottom:6px;' }, [
            el('div', { style: 'display:flex;justify-content:space-between;font-size:12px;margin-bottom:1px;' }, [
              el('span', { textContent: c.cuenta }),
              el('span', { style: 'font-family:var(--font-mono);', textContent: `${formatMoney(c.facturado)} / ${formatMoney(c.planificado)}` }),
            ]),
            el('div', { style: 'height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;' }, [
              el('div', { style: `width:${Math.min(pct, 100)}%;height:100%;background:${quotaColor(pct)};border-radius:3px;` }),
            ]),
          ]));
        }
      } catch (err) {
        $('#descarga-body').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Risk table ---
    async function loadRisk() {
      try {
        const data = await api('/api/v1/pipeline', { solo_estancadas: 'true' });
        const wrap = $('#risk-table');
        wrap.innerHTML = '';
        $('#risk-count').textContent = String(data.propuestas.length);

        if (data.propuestas.length === 0) {
          wrap.innerHTML = '<div class="val-positive" style="text-align:center;padding:20px;">Sin deals estancados</div>';
          return;
        }

        const table = el('table');
        table.appendChild(el('thead', {}, [el('tr', {}, [
          el('th', { textContent: 'Deal' }),
          el('th', { textContent: 'Valor' }),
          el('th', { textContent: 'Dias' }),
          el('th', { textContent: 'Etapa' }),
        ])]));

        const tbody = el('tbody');
        for (const p of data.propuestas) {
          tbody.appendChild(el('tr', {}, [
            el('td', {}, [
              document.createTextNode(p.titulo),
              p.es_mega ? el('span', { className: 'tag tag-mega', textContent: 'MEGA', style: 'margin-left:6px;' }) : null,
            ].filter(Boolean)),
            el('td', { style: 'font-family:var(--font-mono);', textContent: formatMoney(p.valor) }),
            el('td', { className: 'val-danger', style: 'font-weight:600;', textContent: String(p.dias_sin_actividad || 0) }),
            el('td', {}, [el('span', { className: 'tag tag-stage', textContent: p.etapa?.replace(/_/g, ' ') || '-' })]),
          ]));
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
      } catch (err) {
        $('#risk-table').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    window.loadAll = async function() {
      $('#last-refresh').textContent = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
      await Promise.all([loadCuota(), loadPipeline(), loadDescarga(), loadRisk()]);
    };

    loadAll();
    setInterval(loadAll, 60000);
  </script>
</body>
</html>
